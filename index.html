        <h1>Crop Intel USA — Commodity Intelligence & Rail Logistics Platform</h1>

        <h2>Platform Overview</h2>
        <p>Crop Intel is an enterprise-grade commodity intelligence platform serving the Northern Plains grain corridor. It provides real-time market data, freight optimization, and AI-driven insights for agricultural commodity trading.</p>

        <h2>Core Features</h2>
        <ul>
          <li><strong>National Price Heatmap:</strong> Interactive Mapbox-powered visualization of USDA cash bids across the entire U.S. grain market. Covers Yellow Corn, White Corn, Soybeans, Wheat, and Sunflowers.</li>
          <li><strong>BNSF Rail Rate Engine:</strong> Integrated with BNSF Tariff 4022 via mTLS API. Calculates real rail freight from Campbell, MN to over 200 buyer destinations.</li>
          <li><strong>Net Delivered Value (NDV):</strong> Cash Bid minus Freight Cost. The true profitability metric for each buyer lane, computed in real-time.</li>
          <li><strong>Sunflower Best Lanes:</strong> Dedicated oilseed and confection sunflower market with ADM Enderlin, Cargill West Fargo, Red River Commodities, and CHS Fargo.</li>
          <li><strong>Interline Tracking Bridge:</strong> BNSF API provides tracking to Breckenridge interchange, then Commtrex/CPKC ShipOnline bridges visibility for RRVW interline moves.</li>
          <li><strong>Automated Offers:</strong> Bushel-style one-click contract locking with 60-second countdown timer for premium capture.</li>
          <li><strong>Drought Intelligence:</strong> U.S. Drought Monitor (USDM) overlay showing D0-D4 drought severity on the commodity map.</li>
          <li><strong>AI Market Analysis:</strong> Google Gemini-powered buyer rankings, morning market scans, and opportunity identification.</li>
        </ul>

        <h2>Rail Logistics</h2>
        <p>Origin: Campbell, MN (BNSF Station: CAMPB). The platform differentiates between single-line BNSF routes (I=0, e.g., Campbell → West Fargo) and interline moves requiring RRVW hand-off (I=1, e.g., Campbell → Breckenridge → Enderlin). Interline moves incur RRVW switching fees of ~$350/car ($0.28/cwt).</p>

        <h2>Technology Stack</h2>
        <p>React + TypeScript, Vite, Mapbox GL JS, BNSF mTLS API, Google Gemini AI, USDA Market News API, U.S. Drought Monitor API. Deployed on Vercel with Railway backend.</p>
